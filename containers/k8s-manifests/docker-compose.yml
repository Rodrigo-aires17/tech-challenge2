version: '3.8'
services:
  postgres_analytics:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: analytics
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - backend

  postgres_main:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: main
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend

  dynamodb-local:
    image: amazon/dynamodb-local
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb", "-port", "8000"]
    ports:
      - "8000:8000"
    networks:
      - backend

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - DATABASE_HOST=postgres_analytics
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://user:pass@postgres_analytics:5432/analytics
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=us-east-1
      - AWS_SQS_URL=http://sqs.local/queue
      - AWS_DYNAMODB_TABLE=analytics_events
      - AWS_ACCESS_KEY_ID=dev
      - AWS_SECRET_ACCESS_KEY=dev
    depends_on:
      - postgres_analytics
      - redis
      - dynamodb-local
    networks:
      - backend

  flag-service:
    build:
      context: ./flag-service
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - DATABASE_HOST=postgres_main
      - DATABASE_PORT=5432
      - DATABASE_URL=postgresql://user:pass@postgres_main:5432/main
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:8000
    depends_on:
      - postgres_main
    networks:
      - backend

  targeting-service:
    build:
      context: ./targeting-service
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    environment:
      - DATABASE_HOST=postgres_main
      - DATABASE_PORT=5432
      - DATABASE_URL=postgresql://user:pass@postgres_main:5432/main
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:8000
    depends_on:
      - postgres_main
    networks:
      - backend

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres_main:5432/main
      - MASTER_KEY=dev_master_key
    depends_on:
      - postgres_main
    networks:
      - backend

  evaluation-service:
    build:
      context: ./evaluation-service
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres_main:5432/main
      - REDIS_URL=redis://redis:6379
      - FLAG_SERVICE_URL=http://flag-service:8000
      - TARGETING_SERVICE_URL=http://targeting-service:8000
    depends_on:
      - postgres_main
    networks:
      - backend

volumes:
  postgres_analytics_data:
  postgres_main_data:
  redis_data:

networks:
  backend:
    driver: bridge
