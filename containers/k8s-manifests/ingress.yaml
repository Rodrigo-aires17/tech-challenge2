apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: auth-service
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
  - name: http
    port: 8000
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: flag-service
  namespace: flag-service
spec:
  type: ClusterIP
  selector:
    app: flag-service
  ports:
  - name: http
    port: 8002
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: targeting-service
  namespace: targeting-service
spec:
  type: ClusterIP
  selector:
    app: targeting-service
  ports:
  - name: http
    port: 8003
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: evaluation-service
  namespace: evaluation-service
spec:
  type: ClusterIP
  selector:
    app: evaluation-service
  ports:
  - name: http
    port: 8004
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: analytics-service
spec:
  type: ClusterIP
  selector:
    app: analytics-service
  ports:
  - name: http
    port: 8005
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8000
      - path: /flags
        pathType: Prefix
        backend:
          service:
            name: flag-service
            port:
              number: 8002
      - path: /targeting
        pathType: Prefix
        backend:
          service:
            name: targeting-service
            port:
              number: 8003
      - path: /evaluation
        pathType: Prefix
        backend:
          service:
            name: evaluation-service
            port:
              number: 8004
      - path: /analytics
        pathType: Prefix
        backend:
          service:
            name: analytics-service
            port:
              number: 8005
