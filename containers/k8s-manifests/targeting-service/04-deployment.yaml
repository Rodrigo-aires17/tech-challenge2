apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service
  namespace: targeting-service
  labels:
    app: targeting-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: targeting-service
  template:
    metadata:
      labels:
        app: targeting-service
        version: "1.0"
    spec:
      containers:
      - name: targeting-service
        image: 589138972429.dkr.ecr.us-east-1.amazonaws.com/a/targeting-service:latest.1
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8003
          protocol: TCP
        
        # Variáveis de ambiente
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: targeting-service-secrets
              key: DATABASE_URL
        - name: AWS_SQS_URL
          valueFrom:
            secretKeyRef:
              name: targeting-service-secrets
              key: AWS_SQS_URL
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: targeting-service-secrets
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: targeting-service-secrets
              key: AWS_SECRET_ACCESS_KEY
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: targeting-service-config
              key: AUTH_SERVICE_URL
        - name: FLAG_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: targeting-service-config
              key: FLAG_SERVICE_URL
        - name: TARGETING_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: targeting-service-config
              key: TARGETING_SERVICE_URL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: targeting-service-config
              key: REDIS_URL
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: targeting-service-config
              key: AWS_REGION
        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: targeting-service-config
              key: APP_NAME
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: targeting-service-config
              key: LOG_LEVEL
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: targeting-service-config
              key: PORT
        
        # Resource requests e limits
        resources:
          requests:
            cpu: 150m
            memory: 192Mi
          limits:
            cpu: 300m
            memory: 384Mi
        
        # # Readiness Probe
        # readinessProbe:
        #   httpGet:
        #     path: /health
        #     port: 8003
        #     scheme: HTTP
        #   initialDelaySeconds: 15
        #   periodSeconds: 10
        #   timeoutSeconds: 5
        #   successThreshold: 1
        #   failureThreshold: 3
        
        # # Liveness Probe
        # livenessProbe:
        #   httpGet:
        #     path: /health
        #     port: 8003
        #     scheme: HTTP
        #   initialDelaySeconds: 30
        #   periodSeconds: 15
        #   timeoutSeconds: 5
        #   successThreshold: 1
        #   failureThreshold: 3
        
        # # Startup Probe
        # startupProbe:
        #   httpGet:
        #     path: /health
        #     port: 8003
        #     scheme: HTTP
        #   initialDelaySeconds: 5
        #   periodSeconds: 5
        #   timeoutSeconds: 3
        #   failureThreshold: 30
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - targeting-service
              topologyKey: kubernetes.io/hostname
